services:
  # 1. Backend API (Node.js + SQLite)
  - type: web
    name: mentor-app-backend
    env: node
    plan: free
    branch: backend # Points to your backend branch
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 3001

  # 2. Frontend App (Expo Web)
  - type: web
    name: mentor-app-frontend
    runtime: static
    branch: main # Points to your frontend branch
    buildCommand: npm install && npx expo export --platform web
    staticPublishPath: dist
    envVars:
      - key: EXPO_PUBLIC_API_URL
        value: https://mentor-app-backend.onrender.com
