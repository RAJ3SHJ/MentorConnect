name: Build Android APK (The Bypass)
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: ⚙️ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: ⚙️ Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: ⚙️ Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-cache: true
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🏗 Build Android APK (Local Bypass)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "❌ ERROR: EXPO_TOKEN is not set in GitHub Secrets. Build will fail."
            exit 1
          fi
          # Dynamically create the .env file for the production build
          echo "EXPO_PUBLIC_API_URL=https://mentor-app-backend-w6bk.onrender.com" > .env
          echo "EXPO_PUBLIC_SUPABASE_URL=https://fxmqluspbkjjajdnnxel.supabase.co" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4bXFsdXNwYmtqamFqZG5ueGVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NzkxMTQsImV4cCI6MjA5MDM1NTExNH0.mCeIB_KxKQqhHg35fVMem5xlq8y6X07xiX9GK31NrfM" >> .env
          
          # Use npx for EAS CLI and run build
          npx eas-cli build --platform android --profile preview --local --non-interactive --output ./mentor-app-release.apk

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mentor-Connect-APK
          path: ./mentor-app-release.apk
