name: Build Android APK (The Bypass)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: ⚙️ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: ⚙️ Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: ⚙️ Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-cache: true
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm install

      - name: 🏗 Build Android APK (Local Bypass)
        # Using --local tells EAS to use GitHub's servers to build, NOT Expo's servers.
        # This bypasses the monthly "Free Tier" limit.
        run: npx eas-cli build --platform android --profile preview --local --non-interactive

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Executive-Pulse-APK
          path: ./*.apk
