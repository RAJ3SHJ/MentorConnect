name: Build Android APK (The Bypass)
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version Name'
        required: false
        default: 'latest'
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: ⚙️ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: ⚙️ Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: ⚙️ Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-cache: true
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🔍 Verify Expo Auth
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npx eas-cli whoami

      - name: 🛠 Prebuild
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npx expo prebuild --platform android --non-interactive

      - name: 🏗 Build Android APK (Local Bypass)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_DEBUG: true
          DEBUG: expo:*
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "❌ ERROR: EXPO_TOKEN is not set in GitHub Secrets. Build will fail."
            exit 1
          fi
          
          # Use values from app.json or secrets if available
          echo "EXPO_PUBLIC_API_URL=https://mentor-app-backend-w6bk.onrender.com" > .env
          echo "EXPO_PUBLIC_SUPABASE_URL=https://fxmqluspbkjjajdnnxel.supabase.co" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4bXFsdXNwYmtqamFqZG5ueGVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NzkxMTQsImV4cCI6MjA5MDM1NTExNH0.mCeIB_KxKQqhHg35fVMem5xlq8y6X07xiX9GK31NrfM" >> .env
          
          echo "🚀 Starting Local EAS Build with Debugging..."
          npx eas-cli build --platform android --profile preview --local --non-interactive --output ./Mentor-Connect-Release.apk

      - name: 📤 Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Mentor-Connect-APK
          path: ./Mentor-Connect-Release.apk

      - name: 🚀 Create GitHub Release
        if: success() && (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Mentor Connect Build ${{ github.run_number }}
          draft: false
          prerelease: false
          files: ./Mentor-Connect-Release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
